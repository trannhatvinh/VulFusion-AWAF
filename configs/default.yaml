seed: 42
device: "cuda"

scope:
  languages: ["c", "cpp", "c++"]

paths:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  split_data_dir: "data/splits"
  vendor_dir: "vendor"
  tree_sitter_lib: "build/my-languages.so"
  checkpoint_dir: "checkpoints"
  output_dir: "outputs"

models:
  codebert_name: "microsoft/codebert-base"
  graphcodebert_name: "microsoft/graphcodebert-base"
  hidden_dim: 768
  dropout: 0.2
  mlp_hidden_dims: [512, 256]

train:
  epochs: 10
  batch_size: 16
  lr: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_len_code: 256
  max_len_graph: 256
  early_stopping_patience: 3
  min_delta: 1.0e-4